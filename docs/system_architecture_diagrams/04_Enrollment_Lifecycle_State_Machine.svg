<svg xmlns="http://www.w3.org/2000/svg" width="960" height="780" viewBox="0 0 960 780" role="img" aria-label="LearnTrack — Enrollment Lifecycle State Machine">
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker>
<marker id="arrow-pink" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="#db2777"/></marker>
<marker id="inherit" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 13 7 L 0 14 z" fill="white" stroke="#2563eb" stroke-width="1.8"/></marker>
</defs>
<rect x="0" y="0" width="960" height="780" fill="#ffffff"/>
<text x="480.0" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#111827">LearnTrack — Enrollment Lifecycle State Machine</text>
<text x="480.0" y="58" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle" fill="#4b5563">Allowed status transitions for one Enrollment record</text>
<g transform="translate(90,115)">
<rect x="0" y="0" width="260" height="90" rx="14" fill="#ffffff" stroke="#334155" stroke-width="1.2"/>
<rect x="0" y="0" width="260" height="34" rx="14" fill="#f8fafc" stroke="#334155" stroke-width="1.2"/>
<path d="M 0 32 H 260" stroke="#334155" stroke-width="1"/>
<text x="130.0" y="23" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#111827">Enrollment Request</text>
<text x="18" y="52" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4b5563"><tspan font-weight="700" fill="#111827">Created by:</tspan> enrollStudent(...)</text>
</g>
<g transform="translate(100,300)">
<rect x="0" y="0" width="230" height="95" rx="14" fill="#ffffff" stroke="#334155" stroke-width="1.2"/>
<rect x="0" y="0" width="230" height="34" rx="14" fill="#dcfce7" stroke="#334155" stroke-width="1.2"/>
<path d="M 0 32 H 230" stroke="#334155" stroke-width="1"/>
<text x="115.0" y="23" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#111827">ACTIVE</text>
<text x="18" y="52" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4b5563"><tspan font-weight="700" fill="#111827">Seat:</tspan> occupied</text>
<text x="18" y="70" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4b5563"><tspan font-weight="700" fill="#111827">Next:</tspan> complete or cancel</text>
</g>
<g transform="translate(590,300)">
<rect x="0" y="0" width="230" height="95" rx="14" fill="#ffffff" stroke="#334155" stroke-width="1.2"/>
<rect x="0" y="0" width="230" height="34" rx="14" fill="#fef3c7" stroke="#334155" stroke-width="1.2"/>
<path d="M 0 32 H 230" stroke="#334155" stroke-width="1"/>
<text x="115.0" y="23" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#111827">WAITLISTED</text>
<text x="18" y="52" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4b5563"><tspan font-weight="700" fill="#111827">Seat:</tspan> not occupied</text>
<text x="18" y="70" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4b5563"><tspan font-weight="700" fill="#111827">Next:</tspan> promote or cancel</text>
</g>
<g transform="translate(100,560)">
<rect x="0" y="0" width="230" height="95" rx="14" fill="#ffffff" stroke="#334155" stroke-width="1.2"/>
<rect x="0" y="0" width="230" height="34" rx="14" fill="#e0e7ff" stroke="#334155" stroke-width="1.2"/>
<path d="M 0 32 H 230" stroke="#334155" stroke-width="1"/>
<text x="115.0" y="23" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#111827">COMPLETED</text>
<text x="18" y="52" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4b5563"><tspan font-weight="700" fill="#111827">Final:</tspan> true</text>
<text x="18" y="70" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4b5563"><tspan font-weight="700" fill="#111827">Further changes:</tspan> blocked</text>
</g>
<g transform="translate(590,560)">
<rect x="0" y="0" width="230" height="95" rx="14" fill="#ffffff" stroke="#334155" stroke-width="1.2"/>
<rect x="0" y="0" width="230" height="34" rx="14" fill="#fee2e2" stroke="#334155" stroke-width="1.2"/>
<path d="M 0 32 H 230" stroke="#334155" stroke-width="1"/>
<text x="115.0" y="23" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#111827">CANCELLED</text>
<text x="18" y="52" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4b5563"><tspan font-weight="700" fill="#111827">Final:</tspan> true</text>
<text x="18" y="70" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" fill="#4b5563"><tspan font-weight="700" fill="#111827">Further changes:</tspan> blocked</text>
</g>
<line x1="220" y1="205" x2="215" y2="300" stroke="#059669" stroke-width="1.7" marker-end="url(#arrow-green)"/>
<rect x="193.5" y="245" width="103.0" height="18" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
<text x="245" y="258" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#059669">seat available</text>
<line x1="350" y1="160" x2="590" y2="315" stroke="#d97706" stroke-width="1.7" marker-end="url(#arrow-orange)"/>
<rect x="451.25" y="228" width="83.5" height="18" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
<text x="493" y="241" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#d97706">course full</text>
<line x1="590" y1="348" x2="330" y2="348" stroke="#d97706" stroke-width="1.7" marker-end="url(#arrow-orange)"/>
<rect x="374.5" y="320" width="181.0" height="18" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
<text x="465" y="333" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#d97706">oldest waitlisted promoted</text>
<line x1="215" y1="395" x2="215" y2="560" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
<rect x="203.5" y="472" width="103.0" height="18" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
<text x="255" y="485" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#2563eb">mark completed</text>
<path d="M 265 395 C 400 455 590 455 705 560" fill="none" stroke="#64748b" stroke-width="1.7" marker-end="url(#arrow-gray)"/>
<rect x="431.75" y="442" width="96.5" height="18" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
<text x="480" y="455" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#64748b">cancel active</text>
<line x1="705" y1="395" x2="705" y2="560" stroke="#64748b" stroke-width="1.7" marker-end="url(#arrow-gray)"/>
<rect x="700.25" y="472" width="109.5" height="18" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
<text x="755" y="485" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#64748b">cancel waitlist</text>
<text x="480" y="710" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#111827">Final-state rule: COMPLETED and CANCELLED enrollments cannot be changed again.</text>
</svg>